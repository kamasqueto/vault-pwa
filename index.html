<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vault">
<meta name="application-name" content="Vault">
<meta name="theme-color" content="#0c0e13">
<meta name="description" content="Consulta de senhas e equipamentos">

<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

<title>Vault</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0c0e13;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; font-family: sans-serif;
  }
  .logo {
    width: 72px; height: 72px; border-radius: 20px;
    background: #1c2030; border: 1px solid rgba(255,255,255,.15);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 48px rgba(79,255,176,.2);
  }
  .name {
    font-size: 26px; font-weight: 800;
    color: #e8eaf2; letter-spacing: -.5px;
  }
  .bar-wrap {
    width: 110px; height: 3px;
    background: #1c2030; border-radius: 10px; overflow: hidden;
  }
  .bar {
    height: 100%; background: #4fffb0;
    border-radius: 10px; width: 0;
    animation: load 1s ease forwards;
  }
  @keyframes load { to { width: 100%; } }
</style>
</head>
<body>

<div class="logo">
  <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#4fffb0" stroke-width="1.8" stroke-linecap="round">
    <rect x="3" y="11" width="18" height="11" rx="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
</div>
<div class="name">Vault</div>
<div class="bar-wrap"><div class="bar"></div></div>

<script>
  // URL do seu Apps Script
  const APP_URL = 'https://script.google.com/macros/s/AKfycbzN7ml68BVPO0u2OFThdNpZs8m-XYuvyb5Ytz1mM614dOr-SnXz8yqvofScMWS9cZYr3Q/exec';

  // Registra Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // Redireciona após a animação (1 segundo)
  setTimeout(() => {
    window.location.replace(APP_URL);
  }, 1000);
</script>
</body>
</html>
